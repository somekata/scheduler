<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研究室探訪 スケジューラー</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Zen+Antique&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1208;
        --paper: #f5f0e8;
        --paper-dark: #ede6d6;
        --accent: #8b3a2a;
        --accent-light: #c4614e;
        --border: #c8bfa8;
        --shadow: rgba(26, 18, 8, 0.15);
        --green: #2e7d32;
        --green-bg: #e8f5e9;
        --green-border: #a5d6a7;
        --orange: #e65100;
        --orange-bg: #fff3e0;
        --orange-border: #ffcc80;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Noto Serif JP", serif;
        min-height: 100vh;
        padding: 40px 20px 80px;
        background-image:
          radial-gradient(ellipse at top left, #e8dcc8 0%, transparent 60%),
          radial-gradient(ellipse at bottom right, #ddd0b8 0%, transparent 60%);
      }

      .page-wrap {
        max-width: 820px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 44px;
        padding-bottom: 28px;
        border-bottom: 2px solid var(--border);
        position: relative;
      }
      header::after {
        content: "";
        position: absolute;
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
        width: 40%;
        height: 1px;
        background: var(--border);
      }
      .logo-mark {
        font-size: 11px;
        letter-spacing: 4px;
        color: var(--accent);
        margin-bottom: 10px;
        opacity: 0.8;
      }
      h1 {
        font-family: "Zen Antique", serif;
        font-size: clamp(26px, 5vw, 40px);
        font-weight: 400;
        letter-spacing: 6px;
        color: var(--ink);
        margin-bottom: 8px;
      }
      .subtitle {
        font-size: 13px;
        color: #7a6f5e;
        letter-spacing: 2px;
        font-weight: 300;
      }

      /* Steps */
      .steps {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin-bottom: 36px;
      }
      .step {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        letter-spacing: 1px;
        color: #a09080;
        padding: 8px 0;
        transition: color 0.3s;
      }
      .step.active {
        color: var(--accent);
      }
      .step.done {
        color: var(--green);
      }
      .step-num {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
        border: 1.5px solid currentColor;
        flex-shrink: 0;
        transition:
          background 0.3s,
          color 0.3s;
      }
      .step.done .step-num {
        background: var(--green);
        color: white;
        border-color: var(--green);
      }
      .step.active .step-num {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .step-arrow {
        color: #c0b4a0;
        margin: 0 10px;
        font-size: 14px;
      }

      /* Card */
      .card {
        background: white;
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 32px 36px;
        margin-bottom: 24px;
        box-shadow: 0 2px 12px var(--shadow);
        position: relative;
      }
      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 3px;
        height: 100%;
        background: var(--accent);
        border-radius: 4px 0 0 4px;
      }
      .card.hidden {
        display: none;
      }
      .card.fadein {
        animation: fadeIn 0.35s ease;
      }

      .section-label {
        font-size: 11px;
        letter-spacing: 3px;
        color: var(--accent);
        text-transform: uppercase;
        margin-bottom: 20px;
        font-weight: 600;
      }

      /* Room input */
      .room-input-wrap {
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      .room-input-wrap label {
        font-size: 14px;
        color: #5a4e3a;
        white-space: nowrap;
        letter-spacing: 0.5px;
      }
      .room-text-input {
        flex: 1;
        min-width: 200px;
        max-width: 340px;
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 3px;
        font-family: "Noto Serif JP", serif;
        font-size: 15px;
        color: var(--ink);
        background: var(--paper);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      .room-text-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(139, 58, 42, 0.1);
        background: white;
      }
      .room-text-input::placeholder {
        color: #b0a590;
      }
      .room-preview {
        font-size: 13px;
        color: #7a6f5e;
        margin-top: 10px;
        min-height: 20px;
        letter-spacing: 0.5px;
      }
      .room-preview span {
        color: var(--accent);
        font-weight: 600;
      }

      /* Progress */
      .progress-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 20px;
        padding: 12px 16px;
        background: var(--paper-dark);
        border-radius: 3px;
        border: 1px solid var(--border);
      }
      .progress-label {
        font-size: 12px;
        color: #6a5f4e;
        white-space: nowrap;
        letter-spacing: 1px;
      }
      .progress-bar-wrap {
        flex: 1;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-light));
        border-radius: 3px;
        transition: width 0.4s ease;
        width: 0%;
      }
      .progress-count {
        font-size: 12px;
        font-weight: 600;
        color: var(--accent);
        white-space: nowrap;
      }

      /* Table */
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }
      thead th {
        background: var(--paper-dark);
        padding: 10px 14px;
        text-align: left;
        font-size: 12px;
        letter-spacing: 1px;
        color: #5a4e3a;
        border-bottom: 2px solid var(--border);
        font-weight: 600;
        white-space: nowrap;
      }
      tbody tr {
        border-bottom: 1px solid #ede8de;
        transition: background 0.15s;
      }
      tbody tr:last-child {
        border-bottom: none;
      }
      tbody tr:hover {
        background: #faf7f0;
      }
      td {
        padding: 10px 14px;
        color: var(--ink);
        white-space: nowrap;
      }

      .capacity-input {
        width: 90px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 3px;
        font-family: "Noto Serif JP", serif;
        font-size: 14px;
        color: var(--ink);
        background: var(--paper);
        text-align: center;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        appearance: none;
        -moz-appearance: textfield;
      }
      .capacity-input::-webkit-outer-spin-button,
      .capacity-input::-webkit-inner-spin-button {
        -webkit-appearance: none;
      }
      .capacity-input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(139, 58, 42, 0.1);
        background: white;
      }
      .capacity-input::placeholder {
        color: #b0a590;
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      .badge-filled {
        background: var(--green-bg);
        color: var(--green);
        border: 1px solid var(--green-border);
      }
      .badge-empty {
        background: var(--orange-bg);
        color: var(--orange);
        border: 1px solid var(--orange-border);
      }

      /* Buttons */
      .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: flex-end;
        margin-top: 20px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 24px;
        border: none;
        border-radius: 3px;
        font-family: "Noto Serif JP", serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 1px;
        transition: all 0.2s;
      }
      .btn-primary {
        background: var(--accent);
        color: white;
        box-shadow: 0 2px 8px rgba(139, 58, 42, 0.3);
      }
      .btn-primary:hover {
        background: #732f21;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(139, 58, 42, 0.35);
      }
      .btn-primary:active {
        transform: translateY(0);
      }
      .btn-primary:disabled {
        background: #c0b8ac;
        box-shadow: none;
        cursor: not-allowed;
        transform: none;
      }
      .btn-secondary {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--accent);
      }
      .btn-secondary:hover {
        background: rgba(139, 58, 42, 0.06);
      }

      /* Download */
      .download-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        background: var(--paper-dark);
        border: 1px solid var(--border);
        border-radius: 3px;
        gap: 12px;
      }
      .file-info {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .file-icon {
        font-size: 20px;
        flex-shrink: 0;
      }
      .file-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--ink);
      }
      .file-meta {
        font-size: 12px;
        color: #8a7f6e;
      }
      .btn-dl {
        flex-shrink: 0;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 18px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 3px;
        font-family: "Noto Serif JP", serif;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.5px;
        transition: background 0.15s;
        text-decoration: none;
      }
      .btn-dl:hover {
        background: #732f21;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 28px;
        right: 28px;
        background: var(--ink);
        color: var(--paper);
        padding: 12px 20px;
        border-radius: 4px;
        font-size: 13px;
        letter-spacing: 0.5px;
        box-shadow: 0 4px 16px var(--shadow);
        transform: translateY(80px);
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        z-index: 100;
        max-width: 300px;
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        .card {
          padding: 20px 16px;
        }
        .btn-row {
          justify-content: stretch;
        }
        .btn {
          width: 100%;
          justify-content: center;
        }
        .room-input-wrap {
          flex-direction: column;
          align-items: flex-start;
        }
        .room-text-input {
          max-width: 100%;
          width: 100%;
        }
        .step span {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-wrap">
      <header>
        <div class="logo-mark">Research Lab Visit</div>
        <h1>研究室探訪</h1>
        <p class="subtitle">スケジュール入力フォーム</p>
      </header>

      <div class="steps">
        <div class="step active" id="s1">
          <div class="step-num">1</div>
          <span>教室名を入力</span>
        </div>
        <div class="step-arrow">›</div>
        <div class="step" id="s2">
          <div class="step-num">2</div>
          <span>受け入れ人数を入力</span>
        </div>
        <div class="step-arrow">›</div>
        <div class="step" id="s3">
          <div class="step-num">3</div>
          <span>CSV を生成</span>
        </div>
      </div>

      <!-- Step 1 -->
      <div class="card" id="card1">
        <div class="section-label">Step 1 — 教室名</div>
        <div class="room-input-wrap">
          <label for="roomNameInput">教室名</label>
          <input
            type="text"
            id="roomNameInput"
            class="room-text-input"
            placeholder="例：細菌学"
            oninput="onRoomInput()"
            onkeydown="if (event.key === 'Enter') confirmRoom();"
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <div class="room-preview" id="roomPreview">
          教室名を入力してください
        </div>
        <div class="btn-row">
          <button
            class="btn btn-primary"
            id="confirmRoomBtn"
            onclick="confirmRoom()"
            disabled
          >
            次へ →
          </button>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="card hidden" id="card2">
        <div class="section-label">Step 2 — 受け入れ人数の入力</div>
        <div class="progress-row">
          <span class="progress-label">入力進捗</span>
          <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressBar"></div>
          </div>
          <span class="progress-count" id="progressCount">0 / 11</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>回数</th>
                <th>日程</th>
                <th>曜日</th>
                <th>時間帯</th>
                <th>受け入れ人数</th>
                <th>状態</th>
              </tr>
            </thead>
            <tbody id="scheduleTable"></tbody>
          </table>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="backToStep1()">
            ← 教室名を変更
          </button>
          <button class="btn btn-secondary" onclick="clearCapacities()">
            リセット
          </button>
          <button
            class="btn btn-primary"
            id="generateBtn"
            onclick="generateCSV()"
            disabled
          >
            CSV を生成 →
          </button>
        </div>
      </div>

      <!-- Step 3: Download -->
      <div class="card hidden" id="card3">
        <div class="section-label">Step 3 — ダウンロード</div>
        <div id="downloadArea"></div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const scheduleData = [
        { no: 1, date: "2026-04-14", day: "火", time: "16:45-17:30" },
        { no: 2, date: "2026-04-14", day: "火", time: "17:30-18:15" },
        { no: 3, date: "2026-04-21", day: "火", time: "16:45-17:30" },
        { no: 4, date: "2026-04-21", day: "火", time: "17:30-18:15" },
        { no: 5, date: "2026-05-12", day: "火", time: "17:30-18:15" },
        { no: 6, date: "2026-05-19", day: "火", time: "17:30-18:15" },
        { no: 7, date: "2026-05-26", day: "火", time: "17:30-18:15" },
        { no: 8, date: "2026-06-09", day: "火", time: "17:30-18:15" },
        { no: 9, date: "2026-06-23", day: "火", time: "17:30-18:15" },
        { no: 10, date: "2026-07-07", day: "火", time: "17:30-18:15" },
        { no: 11, date: "2026-07-14", day: "火", time: "15:45-16:30" },
      ];

      let roomName = "";

      function onRoomInput() {
        const val = document.getElementById("roomNameInput").value.trim();
        document.getElementById("confirmRoomBtn").disabled = val.length === 0;
        document.getElementById("roomPreview").innerHTML =
          val.length > 0
            ? `CSVファイル名: <span>${val}.csv</span>`
            : "教室名を入力してください";
      }

      function confirmRoom() {
        const val = document.getElementById("roomNameInput").value.trim();
        if (!val) return;
        roomName = val;
        setStep(2);
        show("card2");
        buildTable();
        document
          .getElementById("card2")
          .scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function backToStep1() {
        setStep(1);
        hide("card2");
        hide("card3");
      }

      function buildTable() {
        const tbody = document.getElementById("scheduleTable");
        tbody.innerHTML = "";
        scheduleData.forEach((row, i) => {
          const tr = document.createElement("tr");
          tr.innerHTML = `
      <td>${row.no}</td>
      <td>${row.date}</td>
      <td>${row.day}</td>
      <td>${row.time}</td>
      <td>
        <input class="capacity-input" type="number" min="0" max="999"
          id="cap_${i}" placeholder="0" oninput="updateProgress()">
      </td>
      <td><span class="badge badge-empty" id="badge_${i}">未入力</span></td>
    `;
          tbody.appendChild(tr);
        });
        updateProgress();
      }

      function updateProgress() {
        let filled = 0;
        scheduleData.forEach((_, i) => {
          const input = document.getElementById(`cap_${i}`);
          const badge = document.getElementById(`badge_${i}`);
          const entered = input.value !== "";
          if (entered) {
            filled++;
            badge.textContent = "入力済";
            badge.className = "badge badge-filled";
          } else {
            badge.textContent = "未入力";
            badge.className = "badge badge-empty";
          }
        });
        const total = scheduleData.length;
        document.getElementById("progressBar").style.width =
          (filled / total) * 100 + "%";
        document.getElementById("progressCount").textContent =
          `${filled} / ${total}`;
        document.getElementById("generateBtn").disabled = filled < total;
      }

      function clearCapacities() {
        scheduleData.forEach((_, i) => {
          document.getElementById(`cap_${i}`).value = "";
          const badge = document.getElementById(`badge_${i}`);
          badge.textContent = "未入力";
          badge.className = "badge badge-empty";
        });
        document.getElementById("progressBar").style.width = "0%";
        document.getElementById("progressCount").textContent = "0 / 11";
        document.getElementById("generateBtn").disabled = true;
        hide("card3");
        showToast("リセットしました");
      }

      function generateCSV() {
        const header = "回数,日程,曜日,時間帯,受け入れ人数\n";
        const body = scheduleData
          .map((row, i) => {
            const cap = document.getElementById(`cap_${i}`).value;
            return `${row.no},${row.date},${row.day},${row.time},${cap}`;
          })
          .join("\n");

        const csvContent = "\uFEFF" + header + body;
        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const url = URL.createObjectURL(blob);
        const filename = `${roomName}.csv`;

        const totalCap = scheduleData.reduce((sum, _, i) => {
          return (
            sum + (parseInt(document.getElementById(`cap_${i}`).value) || 0)
          );
        }, 0);

        document.getElementById("downloadArea").innerHTML = `
    <div class="download-item">
      <div class="file-info">
        <span class="file-icon">📄</span>
        <div>
          <div class="file-name">${filename}</div>
          <div class="file-meta">11コマ・合計受け入れ人数 ${totalCap} 人</div>
        </div>
      </div>
      <a class="btn-dl" href="${url}" download="${filename}">↓ ダウンロード</a>
    </div>
  `;

        setStep(3);
        show("card3");
        document
          .getElementById("card3")
          .scrollIntoView({ behavior: "smooth", block: "nearest" });
        showToast(`✓ ${filename} を生成しました`);
      }

      /* helpers */
      function show(id) {
        const el = document.getElementById(id);
        el.classList.remove("hidden");
        el.classList.add("fadein");
      }
      function hide(id) {
        document.getElementById(id).classList.add("hidden");
        document.getElementById(id).classList.remove("fadein");
      }
      function setStep(n) {
        [1, 2, 3].forEach((i) => {
          const el = document.getElementById(`s${i}`);
          el.classList.remove("active", "done");
          if (i < n) el.classList.add("done");
          if (i === n) el.classList.add("active");
        });
      }
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._timer);
        t._timer = setTimeout(() => t.classList.remove("show"), 2800);
      }
    </script>
  </body>
</html>
